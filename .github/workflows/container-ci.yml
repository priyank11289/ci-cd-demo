name: Container CI

on:
  push:
  pull_request:

env:
  BUILD_IMAGE: ci-cd-demo-builder
  BUILD_DIR: build-container
  COVERAGE_BUILD_DIR: build-container-coverage

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build C++ Toolchain Image
      run: |
        docker build -t "$BUILD_IMAGE" .

    - name: Format Check
      run: |
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -v "$PWD":/workspace \
          "$BUILD_IMAGE" \
          bash -lc 'clang-format --dry-run --Werror \
            src/main.cpp \
            src/math_utils.cpp \
            src/math_utils.h \
            test/test_coverage.cpp \
            test/test_math.cpp'

    - name: Configure
      run: |
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -v "$PWD":/workspace \
          "$BUILD_IMAGE" \
          bash -lc "cmake -B $BUILD_DIR -DCMAKE_EXPORT_COMPILE_COMMANDS=ON"

    - name: Build
      run: |
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -v "$PWD":/workspace \
          "$BUILD_IMAGE" \
          bash -lc "cmake --build $BUILD_DIR"

    - name: Run Unit Tests
      run: |
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -v "$PWD":/workspace \
          "$BUILD_IMAGE" \
          bash -lc "ctest --test-dir $BUILD_DIR --output-on-failure"

    - name: Clang Tidy
      run: |
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -v "$PWD":/workspace \
          "$BUILD_IMAGE" \
          bash -lc "clang-tidy src/main.cpp -p $BUILD_DIR"

    - name: Configure Coverage
      run: |
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -v "$PWD":/workspace \
          "$BUILD_IMAGE" \
          bash -lc "cmake -B $COVERAGE_BUILD_DIR -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON"

    - name: Build Coverage
      run: |
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -v "$PWD":/workspace \
          "$BUILD_IMAGE" \
          bash -lc "cmake --build $COVERAGE_BUILD_DIR"

    - name: Generate Coverage Report
      run: |
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -v "$PWD":/workspace \
          "$BUILD_IMAGE" \
          bash -lc "cmake --build $COVERAGE_BUILD_DIR --target coverage"

    - name: Coverage Summary
      run: |
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -v "$PWD":/workspace \
          "$BUILD_IMAGE" \
          bash -lc "lcov --rc branch_coverage=1 --summary $COVERAGE_BUILD_DIR/coverage.filtered.info"

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: container-coverage-report
        path: build-container-coverage/coverage-report
        if-no-files-found: error
